<script>
/* ==========================================================
   Utilidades generales
   ========================================================== */

function normalizeKey(key){
  return String(key)
    .trim()
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, '_');
}

function normalizeRow(row){
  const out = {};
  for(const key of Object.keys(row)){
    out[normalizeKey(key)] = row[key];
  }
  return out;
}

function getFirstValue(row, possibleKeys){
  for(const key of possibleKeys){
    const nk = normalizeKey(key);
    if(row[nk] !== undefined && row[nk] !== null && row[nk] !== ''){
      return row[nk];
    }
  }
  return null;
}

function toNumber(value){
  if(value === null || value === undefined || value === '') return NaN;
  if(typeof value === 'number') return value;

  return Number(
    String(value)
      .trim()
      .replace(/\./g, '')
      .replace(',', '.')
  );
}

function formatNumberES(value){
  return new Intl.NumberFormat('es-ES', {
    maximumFractionDigits: 0
  }).format(value);
}

function formatPctES(value){
  return new Intl.NumberFormat('es-ES', {
    minimumFractionDigits: 1,
    maximumFractionDigits: 1
  }).format(value) + '%';
}

function yearMonthLabel(year, month){
  return `${year}-${String(month).padStart(2,'0')}`;
}

/* ==========================================================
   1) Producción de aceituna
   Se lee SIEMPRE desde data/Crop_Anuarios_JA.xlsx
   ========================================================== */

async function loadCropFromXlsx(){
  const response = await fetch('data/Crop_Anuarios_JA.xlsx', {cache:'no-store'});

  if(!response.ok){
    throw new Error(`No se pudo leer data/Crop_Anuarios_JA.xlsx (${response.status})`);
  }

  const buffer = await response.arrayBuffer();
  const workbook = XLSX.read(buffer, {type:'array'});

  const sheetName = workbook.SheetNames.includes('Crop') ? 'Crop' : workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];

  const rowsRaw = XLSX.utils.sheet_to_json(sheet, {
    raw:true,
    defval:null
  });

  const rows = rowsRaw
    .map(normalizeRow)
    .map(row => {
      const year = toNumber(getFirstValue(row, ['Year','Año','Anio','Ano']));
      const cropAnd = toNumber(getFirstValue(row, ['Crop_And','Crop And','Andalucia','Andalucía']));
      const cropSpain = toNumber(getFirstValue(row, ['Crop_Spain','Crop Spain','Spain','España','Espana']));

      return {year, cropAnd, cropSpain};
    })
    .filter(row =>
      Number.isFinite(row.year) &&
      Number.isFinite(row.cropAnd) &&
      Number.isFinite(row.cropSpain)
    )
    .sort((a,b) => a.year - b.year);

  if(!rows.length){
    throw new Error('El Excel de producción no contiene columnas reconocibles: Year, Crop_And y Crop_Spain.');
  }

  return {
    years: rows.map(row => row.year),
    and: rows.map(row => row.cropAnd),
    es: rows.map(row => row.cropSpain)
  };
}

function setKpis(crop){
  const idx = crop.years.length - 1;

  const year = crop.years[idx];
  const andalucia = crop.and[idx];
  const spain = crop.es[idx];
  const share = spain ? (andalucia / spain) * 100 : NaN;

  document.getElementById('kpiYear').textContent = year;
  document.getElementById('kpiAnd').textContent = formatNumberES(andalucia);
  document.getElementById('kpiEs').textContent = formatNumberES(spain);
  document.getElementById('kpiShare').textContent = Number.isFinite(share) ? formatPctES(share) : '—';
}

/* ==========================================================
   2) Polen histórico
   Se lee desde data/polen_hist.xlsx
   Estructura esperada:
   año | mes | indice_pct
   ========================================================== */

async function loadPollenHistoricalFromXlsx(){
  const response = await fetch('data/polen_hist.xlsx', {cache:'no-store'});

  if(!response.ok){
    throw new Error(`No se pudo leer data/polen_hist.xlsx (${response.status})`);
  }

  const buffer = await response.arrayBuffer();
  const workbook = XLSX.read(buffer, {type:'array'});

  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  const rowsRaw = XLSX.utils.sheet_to_json(sheet, {
    raw:true,
    defval:null
  });

  const rows = rowsRaw
    .map(normalizeRow)
    .map(row => {
      const year = toNumber(getFirstValue(row, ['año','anio','ano','year']));
      const month = toNumber(getFirstValue(row, ['mes','month']));
      const index = toNumber(getFirstValue(row, ['indice_pct','índice_pct','indice','índice','index','index_pct']));

      return {year, month, index};
    })
    .filter(row =>
      Number.isFinite(row.year) &&
      Number.isFinite(row.month) &&
      row.month >= 1 &&
      row.month <= 12 &&
      Number.isFinite(row.index)
    );

  if(!rows.length){
    throw new Error('polen_hist.xlsx no contiene filas válidas con año, mes e indice_pct.');
  }

  const grouped = new Map();

  for(const row of rows){
    const key = `${row.year}-${String(row.month).padStart(2,'0')}`;

    if(!grouped.has(key)){
      grouped.set(key, {
        year: row.year,
        month: row.month,
        values: []
      });
    }

    grouped.get(key).values.push(row.index);
  }

  const series = Array.from(grouped.values())
    .map(item => {
      const mean = item.values.reduce((a,b) => a + b, 0) / item.values.length;

      return {
        year: item.year,
        month: item.month,
        label: yearMonthLabel(item.year, item.month),
        value: Number(mean.toFixed(2))
      };
    })
    .sort((a,b) => (a.year - b.year) || (a.month - b.month));

  return {
    labels: series.map(row => row.label),
    values: series.map(row => row.value)
  };
}

/* ==========================================================
   Render de gráficos
   ========================================================== */

let cropChart;
let pollenChart;

function renderCropChart(crop){
  if(cropChart){
    cropChart.destroy();
  }

  cropChart = new Chart(document.getElementById('cropSeries'), {
    type: 'line',
    data: {
      labels: crop.years.map(String),
      datasets: [
        {
          label: 'Andalucía (t aceituna)',
          data: crop.and,
          tension: 0.25,
          pointRadius: 2
        },
        {
          label: 'España (t aceituna)',
          data: crop.es,
          tension: 0.25,
          pointRadius: 2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {position: 'bottom'},
        tooltip: {
          callbacks: {
            label: context => `${context.dataset.label}: ${formatNumberES(context.raw)}`
          }
        }
      },
      interaction: {
        mode: 'index',
        intersect: false
      },
      scales: {
        x: {
          grid: {color: '#ecf0e6'}
        },
        y: {
          grid: {color: '#ecf0e6'},
          ticks: {
            callback: value => formatNumberES(value)
          }
        }
      }
    }
  });
}

function renderPollenChart(series){
  if(pollenChart){
    pollenChart.destroy();
  }

  pollenChart = new Chart(document.getElementById('pollenWeekly'), {
    type: 'line',
    data: {
      labels: series.labels,
      datasets: [
        {
          label: 'Índice mensual de polinización (% del máximo histórico)',
          data: series.values,
          tension: 0.25,
          pointRadius: 2,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {position: 'bottom'},
        tooltip: {
          callbacks: {
            label: context => `${context.dataset.label}: ${Number(context.raw).toFixed(2)}%`
          }
        }
      },
      interaction: {
        mode: 'index',
        intersect: false
      },
      scales: {
        x: {
          grid: {color: '#ecf0e6'},
          ticks: {
            maxTicksLimit: 18,
            maxRotation: 60
          }
        },
        y: {
          min: 0,
          max: 100,
          grid: {color: '#ecf0e6'},
          ticks: {
            callback: value => `${value}%`
          }
        }
      }
    }
  });
}

/* ==========================================================
   Inicialización
   ========================================================== */

async function init(){
  try{
    const crop = await loadCropFromXlsx();
    setKpis(crop);
    renderCropChart(crop);
  }catch(error){
    console.error(error);
    document.getElementById('kpiYear').textContent = 'Error';
    document.getElementById('kpiAnd').textContent = '—';
    document.getElementById('kpiEs').textContent = '—';
    document.getElementById('kpiShare').textContent = '—';
  }

  try{
    const pollen = await loadPollenHistoricalFromXlsx();
    renderPollenChart(pollen);
  }catch(error){
    console.error(error);
  }
}

init();
</script>
